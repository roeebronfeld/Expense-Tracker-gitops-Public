# Production environment - App-of-Apps values

spec:
  project: default
  repoURL: https://github.com/roeebronfeld/Expense-Tracker-gitops-Public.git
  targetRevision: main
  destination:
    server: https://kubernetes.default.svc

platformApps:
  awsLoadBalancerController:
    enabled: true
    namespace: kube-system
    chart: aws-load-balancer-controller
    repoURL: https://aws.github.io/eks-charts
    targetRevision: 1.7.1
    values:
      clusterName: expense-tracker-prod-cluster
      region: us-east-1
      serviceAccount:
        create: true
        name: aws-load-balancer-controller

  externalDns:
    enabled: true
    namespace: external-dns
    chart: external-dns
    repoURL: https://kubernetes-sigs.github.io/external-dns
    targetRevision: 1.15.0
    values:
      provider: aws
      aws:
        region: us-east-1
        zoneType: public
      domainFilters:
        - roctl23.online
      policy: sync
      txtOwnerId: expense-tracker-prod
      serviceAccount:
        create: true
        name: external-dns

  certManager:
    enabled: true
    namespace: cert-manager
    chart: cert-manager
    repoURL: https://charts.jetstack.io
    targetRevision: v1.14.3
    values:
      installCRDs: true
      serviceAccount:
        create: true
        name: cert-manager

  externalSecrets:
    enabled: true
    namespace: external-secrets
    chart: external-secrets
    repoURL: https://charts.external-secrets.io
    targetRevision: 0.9.13
    values:
      installCRDs: true
      serviceAccount:
        create: true
        name: external-secrets

  postgresql:
    enabled: true
    namespace: expense-tracker
    chart: bitnamicharts/postgresql
    repoURL: registry-1.docker.io
    targetRevision: 18.2.4
    values:
      fullnameOverride: expense-tracker-postgresql
      auth:
        database: expense_tracker
        username: expense_admin
        existingSecret: expense-tracker-postgresql
      primary:
        persistence:
          enabled: true
          size: 5Gi
          storageClass: gp2
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi

  monitoring:
    enabled: true
    namespace: monitoring
    chart: kube-prometheus-stack
    repoURL: https://prometheus-community.github.io/helm-charts
    targetRevision: 58.2.1
    valueFiles:
      - $values/environments/prod/grafana-production-values.yaml
    values:
      # Disable control plane components not accessible on EKS
      kubeControllerManager:
        enabled: false
      kubeScheduler:
        enabled: false
      kubeEtcd:
        enabled: false
      kubeProxy:
        enabled: false
      prometheus:
        prometheusSpec:
          retention: 1d
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          storageSpec:
            volumeClaimTemplate:
              spec:
                storageClassName: gp2
                accessModes: ["ReadWriteOnce"]
                resources:
                  requests:
                    storage: 5Gi
      alertmanager:
        enabled: false
      kube-state-metrics:
        resources:
          requests:
            cpu: 10m
            memory: 32Mi
          limits:
            cpu: 100m
            memory: 128Mi

  externalSecretsConfig:
    enabled: true
    namespace: external-secrets
    path: charts/external-secrets-config
    values:
      aws:
        region: us-east-1
      serviceAccount:
        name: external-secrets
        namespace: external-secrets
      clusterSecretStore:
        name: aws-secrets-manager
      postgresql:
        enabled: true
        refreshInterval: 1h
        secrets:
          - namespace: expense-tracker
            targetSecretName: expense-tracker-postgresql
            remoteSecretName: expense-tracker/prod/postgresql/auth
      argocd:
        enabled: false

  certManagerConfig:
    enabled: true
    namespace: cert-manager
    path: charts/cert-manager-config
    values:
      email: "admin@roctl23.online"
      aws:
        region: us-east-1
      acmeServer: https://acme-v02.api.letsencrypt.org/directory
      createStagingIssuer: true

  fluentBit:
    enabled: true
    namespace: logging
    chart: aws-for-fluent-bit
    repoURL: https://aws.github.io/eks-charts
    targetRevision: 0.1.34
    values:
      serviceAccount:
        create: true
        name: fluent-bit
      cloudWatchLogs:
        enabled: true
        region: us-east-1
        logGroupName: /eks/expense-tracker-prod-cluster/containers
        logStreamPrefix: fluent-bit-
        autoCreateGroup: false
      firehose:
        enabled: false
      kinesis:
        enabled: false
      elasticsearch:
        enabled: false
      tolerations:
        - operator: Exists
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          cpu: 200m
          memory: 128Mi

workloadApps:
  backend:
    enabled: true
    namespace: expense-tracker
    path: charts/backend
    valueFiles:
      - ../../environments/prod/backend-values.yaml

  frontend:
    enabled: true
    namespace: expense-tracker
    path: charts/frontend
    valueFiles:
      - ../../environments/prod/frontend-values.yaml
