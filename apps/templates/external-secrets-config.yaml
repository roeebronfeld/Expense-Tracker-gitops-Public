{{- if .Values.platformApps.externalSecretsConfig.enabled }}
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-secrets-config
  namespace: argocd
  labels:
    {{- include "apps.labels" . | nindent 4 }}
  annotations:
    # Ensure this syncs after ESO is ready
    argocd.argoproj.io/sync-wave: "1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: {{ .Values.spec.project }}
  
  source:
    repoURL: {{ .Values.spec.repoURL }}
    targetRevision: {{ .Values.spec.targetRevision }}
    path: {{ .Values.platformApps.externalSecretsConfig.path }}
    helm:
      valuesObject:
        {{- toYaml .Values.platformApps.externalSecretsConfig.values | nindent 8 }}
  
  destination:
    server: {{ .Values.spec.destination.server }}
    namespace: {{ .Values.platformApps.externalSecretsConfig.namespace }}
  
  syncPolicy:
    {{- include "apps.syncPolicy" . | nindent 4 }}

  ignoreDifferences:
    - group: external-secrets.io
      kind: ExternalSecret
      jqPathExpressions:
        - '.spec.data[]?.remoteRef.conversionStrategy'
        - '.spec.data[]?.remoteRef.decodingStrategy'
        - '.spec.data[]?.remoteRef.metadataPolicy'
{{- end }}
