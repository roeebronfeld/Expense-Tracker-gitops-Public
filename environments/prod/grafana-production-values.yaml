# Grafana Production Configuration
# Basic auth login, IP-restricted ALB, TLS via ACM

grafana:
  enabled: true

  admin:
    existingSecret: grafana-admin-secret
    userKey: admin-user
    passwordKey: admin-password

  persistence:
    enabled: true
    size: 2Gi
    storageClassName: gp2
    accessModes:
      - ReadWriteOnce

  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi

  ingress:
    enabled: true
    ingressClassName: alb
    annotations:
      alb.ingress.kubernetes.io/scheme: internet-facing
      alb.ingress.kubernetes.io/target-type: ip
      alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS":443}]'
      alb.ingress.kubernetes.io/ssl-policy: ELBSecurityPolicy-TLS13-1-2-2021-06
      alb.ingress.kubernetes.io/inbound-cidrs: "203.0.113.10/32"
      alb.ingress.kubernetes.io/group.name: expense-tracker-ops
      alb.ingress.kubernetes.io/group.order: "20"
      alb.ingress.kubernetes.io/healthcheck-path: /api/health
      alb.ingress.kubernetes.io/healthcheck-protocol: HTTP
      alb.ingress.kubernetes.io/backend-protocol: HTTP
      external-dns.alpha.kubernetes.io/hostname: graf.prod.roctl23.online
    hosts:
      - graf.prod.roctl23.online
    tls: []

  grafana.ini:
    server:
      domain: graf.prod.roctl23.online
      root_url: https://graf.prod.roctl23.online
      enforce_domain: true
    auth:
      disable_login_form: false
      disable_signout_menu: false
    auth.basic:
      enabled: true
    auth.anonymous:
      enabled: false
    auth.generic_oauth:
      enabled: false
    security:
      cookie_secure: true
      strict_transport_security: true
      x_content_type_options: true
      x_xss_protection: true

  envFromSecrets: []

  sidecar:
    dashboards:
      enabled: true
      searchNamespace: ALL
      label: grafana_dashboard
      folderAnnotation: grafana_folder
      provider:
        foldersFromFilesStructure: true
    datasources:
      enabled: true

  extraObjects:
    - apiVersion: external-secrets.io/v1beta1
      kind: ExternalSecret
      metadata:
        name: grafana-admin-secret
        namespace: monitoring
      spec:
        refreshInterval: 15s
        secretStoreRef:
          name: aws-secrets-manager
          kind: ClusterSecretStore
        target:
          name: grafana-admin-secret
          creationPolicy: Owner
        data:
          - secretKey: admin-user
            remoteRef:
              key: expense-tracker/prod/grafana/admin-credentials
              property: admin-user
          - secretKey: admin-password
            remoteRef:
              key: expense-tracker/prod/grafana/admin-credentials
              property: admin-password
