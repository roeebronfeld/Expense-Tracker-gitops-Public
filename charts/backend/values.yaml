# Backend Helm Chart - Expense Tracker API

replicaCount: 2

# Image configuration
image:
  repository: 123456789012.dkr.ecr.us-east-1.amazonaws.com/expense-tracker-backend
  tag: latest
  pullPolicy: Always

imagePullSecrets: []

# Service account
serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

# Pod annotations
podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "3000"
  prometheus.io/path: "/health"

# Pod labels
podLabels:
  app.kubernetes.io/component: api

# Security context
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

# Container configuration
containerPort: 3000

# Environment variables
env:
  NODE_ENV: production
  PORT: "3000"

# Database configuration
database:
  # Use External Secret for DATABASE_URL (recommended for RDS)
  # Set to true when using AWS RDS with External Secrets Operator
  useExternalSecret: false
  externalSecretName: database-credentials
  
  # Legacy in-cluster PostgreSQL settings (ignored when useExternalSecret=true)
  host: expense-tracker-postgresql
  port: 5432
  name: expense_tracker
  user: expense_admin
  # Secret containing the password (auto-generated by PostgreSQL Helm chart)
  passwordSecretName: expense-tracker-postgresql
  passwordSecretKey: password

# Resources
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

# Health checks
livenessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 5
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3

# Autoscaling
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

# Pod Disruption Budget
podDisruptionBudget:
  enabled: true
  minAvailable: 1

# Node selector
nodeSelector: {}

# Tolerations
tolerations: []

# Affinity - prefer spreading across nodes
affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: expense-tracker-backend
          topologyKey: kubernetes.io/hostname

# Service configuration
service:
  type: ClusterIP
  port: 80
  targetPort: 3000
  annotations: {}

# Ingress configuration
ingress:
  enabled: true
  className: alb
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/healthcheck-path: /health
    alb.ingress.kubernetes.io/healthcheck-interval-seconds: "15"
    alb.ingress.kubernetes.io/healthcheck-timeout-seconds: "5"
    alb.ingress.kubernetes.io/healthy-threshold-count: "2"
    alb.ingress.kubernetes.io/unhealthy-threshold-count: "3"
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS": 443}]'
    alb.ingress.kubernetes.io/ssl-policy: ELBSecurityPolicy-TLS-1-2-2017-01
    # Certificate ARN - set via values override
    # alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:...
  hosts:
    - host: api.expense-tracker.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []

# Network Policy
networkPolicy:
  enabled: false  # Disabled by default; enable in environments with NetworkPolicy enforcement
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: expense-tracker
      ports:
        - port: 3000
          protocol: TCP
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: expense-tracker
      ports:
        - port: 5432
          protocol: TCP
    - to:
        - namespaceSelector: {}
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP

# Migration job configuration
migration:
  enabled: true
  # Use same image as main app
  command: ["npx", "prisma", "migrate", "deploy"]
  # Resources for migration job
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
  # TTL for completed jobs (seconds)
  ttlSecondsAfterFinished: 600
  # Backoff limit
  backoffLimit: 3
