# ExternalSecrets for PostgreSQL chart credentials
{{- if .Values.postgresql.enabled }}
{{- range .Values.postgresql.secrets }}
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ .targetSecretName }}
  namespace: {{ .namespace }}
  labels:
    app.kubernetes.io/name: external-secrets-config
    app.kubernetes.io/component: postgresql-auth
    app.kubernetes.io/part-of: database
spec:
  refreshInterval: {{ $.Values.postgresql.refreshInterval }}
  secretStoreRef:
    name: {{ $.Values.clusterSecretStore.name }}
    kind: ClusterSecretStore
  target:
    name: {{ .targetSecretName }}
    creationPolicy: Owner
  data:
    - secretKey: password
      remoteRef:
        key: {{ .remoteSecretName }}
        property: password
    - secretKey: postgres-password
      remoteRef:
        key: {{ .remoteSecretName }}
        property: postgres-password
{{- end }}
{{- end }}
